name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install "PyMuPDF>=1.24,<1.27" "Pillow>=10,<12" "numpy>=1.24,<2.1" "pytest>=8,<9"
      - name: Run tests
        run: python -m pytest -q
